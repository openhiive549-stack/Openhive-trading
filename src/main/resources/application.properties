spring.application.name=crypto-wallet

# Server
server.port=8080

# Database - uses Docker service name in production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/crypto_wallet?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:elsatube@4321}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Session / Cookie
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Strict
server.servlet.session.cookie.name=NEXUS_SESSION

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# KYC upload directory
app.kyc.upload-dir=${APP_KYC_UPLOAD_DIR:uploads/kyc}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging - less verbose in production
logging.level.com.crypto=INFO
logging.level.org.springframework.security=WARN

# Master key
master.key.secret=${MASTER_KEY_SECRET:poiuytrewq}