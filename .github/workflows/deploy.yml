name: CI/CD Deployment to Ubuntu VPS

on:
  push:
    branches:
      - main
      - master

env:
  # FIXED: Changed namespace to match your actual lowercase Docker Hub account
  IMAGE_NAME: openhiive/openhive-trade

jobs:
  # Combined Job: Build application and immediately package into Docker
  build-push-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant Execute Permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Compile and Package (Skip Tests for Fast Deploy)
        run: ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Deployment Steps ---
      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "docker-compose.yml"
          target: "~/Openhive-trade/"

      - name: SSH Command to Restart Application Stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            mkdir -p ~/Openhive-trade
            cd ~/Openhive-trade

            # 1. Create .env if it doesn't exist
            if [ ! -f .env ]; then
              echo "[INFO] Creating .env file..."
              DB_ROOT_PASS=$(openssl rand -hex 16)
              DB_APP_PASS=$(openssl rand -hex 16)
              echo "DB_ROOT_PASSWORD=${DB_ROOT_PASS}" > .env
              echo "DB_USER=nexus_user" >> .env
              echo "DB_PASSWORD=${DB_APP_PASS}" >> .env
              echo "MASTER_KEY_SECRET=${{ secrets.MASTER_KEY_SECRET }}" >> .env
            else
              echo "[INFO] Using existing .env..."
              # Always keep MASTER_KEY_SECRET up to date
              sed -i '/^MASTER_KEY_SECRET=/d' .env
              echo "MASTER_KEY_SECRET=${{ secrets.MASTER_KEY_SECRET }}" >> .env
            fi

            # 2. Log in to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # 3. Pull latest image
            echo "[INFO] Pulling latest Docker image..."
            docker compose pull

            # 4. Restart stack
            echo "[INFO] Restarting stack..."
            docker compose up -d --remove-orphans

            # 5. Cleanup dangling images
            echo "[INFO] Cleaning up..."
            docker image prune -f

            echo "[SUCCESS] Deployment complete!"